<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Meta Title (60 Chars Max) -->
    <title>My Dashboard | DailyCalc.org</title>
    <!-- Meta Description (160 Chars Max) -->
    <meta name="description" content="View your saved calculation history, favorite tools, and presets on your personal DailyCalc.org dashboard.">
    <!-- Prevent this page from being indexed by search engines -->
    <meta name="robots" content="noindex, nofollow">

    <link rel="canonical" href="https://dailycalc.org/dashboard.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
    
    <!-- Link to our global stylesheet -->
    <link rel="stylesheet" href="js/global.css">
    
    <!-- 1. Load Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Load Centralized Tailwind Config -->
    <script src="js/tailwind-config.js"></script>
    
    <!-- Global Script -->
    <script src="js/global.js" defer></script>
    
    <!-- Layout Script -->
    <script src="js/common-layout.js" defer></script>

</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased">
    
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <main id="dashboard-page" class="bg-slate-50">
        <div class="mx-auto main-container px-2 py-4 sm:px-4">
            
            <!-- Header Row -->
            <div class="mb-4">
                <h1 class="font-heading text-lg font-bold text-brand-dark flex items-center gap-2">
                    <i class="fa-solid fa-gauge-high text-brand-red" aria-hidden="true"></i> Dashboard
                </h1>
                <p class="text-xs text-slate-500">Manage your history, favorite tools, and saved calculations.</p>
            </div>

            <!-- Responsive Grid: 1 col mobile, 2 col tablet, 3 col desktop -->
            <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-3 items-start">

                <!-- Section 1: My Wishlist -->
                <section id="wishlist-section" class="content-section h-full min-h-[300px]">
                    <div class="bg-gradient-to-r from-brand-dark to-brand-red px-3 py-2 flex justify-between items-center border-b border-white/10">
                        <div class="flex items-center gap-2">
                            <h2 class="text-sm font-bold text-white flex items-center gap-2">
                                <i class="fa-solid fa-heart text-white/80" aria-hidden="true"></i> My Wishlist
                            </h2>
                            <span id="wishlistCount" class="text-[10px] font-medium text-white/80 bg-white/10 px-2 py-0.5 rounded-full">0</span>
                        </div>
                    </div>

                    <!-- Wishlist Container -->
                    <div id="wishlistContainer" class="max-h-[600px] overflow-y-auto slim-scroll">
                        <!-- JS will inject rows here -->
                    </div>

                    <!-- Wishlist Empty State -->
                    <div id="wishlistEmptyState" class="hidden flex flex-col items-center justify-center py-12 text-center text-slate-400">
                        <i class="fa-regular fa-heart text-3xl mb-2 opacity-20" aria-hidden="true"></i>
                        <p class="text-xs font-medium text-slate-500">No tools saved</p>
                        <p class="text-[10px]">Use the <i class="fa-regular fa-heart" aria-hidden="true"></i> icon to save tools here.</p>
                    </div>
                </section>

                <!-- Section 2: My Calculation History -->
                <section id="history-section" class="content-section h-full min-h-[300px]">
                    <div class="bg-gradient-to-r from-brand-dark to-brand-red px-3 py-2 flex justify-between items-center border-b border-white/10">
                        <div class="flex items-center gap-2">
                            <h2 class="text-sm font-bold text-white flex items-center gap-2">
                                <i class="fa-solid fa-clock-rotate-left text-white/80" aria-hidden="true"></i> Recent History
                            </h2>
                            <span id="historyCount" class="text-[10px] font-medium text-white/80 bg-white/10 px-2 py-0.5 rounded-full">0</span>
                        </div>
                        <!-- Specific Clear Button -->
                        <button id="clearHistoryButton" class="hidden text-[10px] font-semibold text-white/70 hover:text-white hover:bg-white/10 px-2 py-1 rounded transition">
                            <i class="fa-solid fa-trash-can mr-1" aria-hidden="true"></i> Clear
                        </button>
                    </div>

                    <!-- History Container -->
                    <div id="historyContainer" class="max-h-[600px] overflow-y-auto slim-scroll">
                        <!-- JS will inject rows here -->
                    </div>

                    <!-- History Empty State -->
                    <div id="historyEmptyState" class="hidden flex flex-col items-center justify-center py-12 text-center text-slate-400">
                        <i class="fa-solid fa-clock-rotate-left text-3xl mb-2 opacity-20" aria-hidden="true"></i>
                        <p class="text-xs font-medium text-slate-500">No history yet</p>
                        <p class="text-[10px]">Calculations appear here automatically.</p>
                    </div>
                </section>

                <!-- Section 3: My Saved Presets -->
                <section id="presets-section" class="content-section h-full min-h-[300px]">
                    <div class="bg-gradient-to-r from-brand-dark to-brand-red px-3 py-2 flex justify-between items-center border-b border-white/10">
                        <div class="flex items-center gap-2">
                            <h2 class="text-sm font-bold text-white flex items-center gap-2">
                                <i class="fa-solid fa-bookmark text-white/80" aria-hidden="true"></i> Saved Presets
                            </h2>
                            <span id="presetsCount" class="text-[10px] font-medium text-white/80 bg-white/10 px-2 py-0.5 rounded-full">0</span>
                        </div>
                        <!-- Specific Clear Button -->
                        <button id="clearPresetsButton" class="hidden text-[10px] font-semibold text-white/70 hover:text-white hover:bg-white/10 px-2 py-1 rounded transition">
                            <i class="fa-solid fa-trash-can mr-1" aria-hidden="true"></i> Clear
                        </button>
                    </div>

                    <!-- Presets Container -->
                    <div id="presetsContainer" class="max-h-[600px] overflow-y-auto slim-scroll">
                        <!-- JS will inject rows here -->
                    </div>

                    <!-- Presets Empty State -->
                    <div id="presetsEmptyState" class="hidden flex flex-col items-center justify-center py-12 text-center text-slate-400">
                        <i class="fa-solid fa-star text-3xl mb-2 opacity-20" aria-hidden="true"></i>
                        <p class="text-xs font-medium text-slate-500">No presets saved</p>
                        <p class="text-[10px]">Save specific results to view them here.</p>
                    </div>
                </section>
            </div>

        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>
    
    <!-- Dashboard Logic Consolidated Inline -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {

            // --- DOM Elements ---
            const historyContainer = document.getElementById('historyContainer');
            const historyEmptyState = document.getElementById('historyEmptyState');
            const clearHistoryButton = document.getElementById('clearHistoryButton');
            const historyCountBadge = document.getElementById('historyCount');
            
            const presetsContainer = document.getElementById('presetsContainer');
            const presetsEmptyState = document.getElementById('presetsEmptyState');
            const clearPresetsButton = document.getElementById('clearPresetsButton');
            const presetsCountBadge = document.getElementById('presetsCount');

            const wishlistContainer = document.getElementById('wishlistContainer');
            const wishlistEmptyState = document.getElementById('wishlistEmptyState');
            const wishlistCountBadge = document.getElementById('wishlistCount');

            // --- Helper: Time Ago ---
            function timeAgo(dateString) {
                if(!dateString) return "";
                const date = new Date(dateString);
                const now = new Date();
                const seconds = Math.floor((now - date) / 1000);
                
                let interval = seconds / 31536000;
                if (interval > 1) return Math.floor(interval) + "y ago";
                interval = seconds / 2592000;
                if (interval > 1) return Math.floor(interval) + "mo ago";
                interval = seconds / 86400;
                if (interval > 1) return Math.floor(interval) + "d ago";
                interval = seconds / 3600;
                if (interval > 1) return Math.floor(interval) + "h ago";
                interval = seconds / 60;
                if (interval > 1) return Math.floor(interval) + "m ago";
                return "just now";
            }

            // --- Helper: Get Icon for Calculator ---
            function getIconForCalc(name) {
                if(!name) return 'fa-calculator';
                const lowerName = name.toLowerCase();
                if (lowerName.includes('mortgage') || lowerName.includes('loan')) return 'fa-house-chimney';
                if (lowerName.includes('bmi') || lowerName.includes('health') || lowerName.includes('calorie')) return 'fa-heart-pulse';
                if (lowerName.includes('age') || lowerName.includes('date') || lowerName.includes('time')) return 'fa-calendar-days';
                if (lowerName.includes('converter')) return 'fa-arrows-rotate';
                return 'fa-calculator';
            }

            // --- 1. Load Wishlist (New) ---
            function loadWishlist() {
                let items = [];
                try {
                    // Read directly or use global manager if available
                    items = JSON.parse(localStorage.getItem('dailyCalcWishlist')) || [];
                } catch (e) {
                    console.error("Error reading wishlist", e);
                }

                wishlistContainer.innerHTML = '';
                if (wishlistCountBadge) wishlistCountBadge.textContent = items.length;

                if (items.length === 0) {
                    wishlistEmptyState.classList.remove('hidden');
                    wishlistContainer.classList.add('hidden');
                } else {
                    wishlistEmptyState.classList.add('hidden');
                    wishlistContainer.classList.remove('hidden');

                    const ul = document.createElement('ul');
                    ul.className = 'divide-y divide-slate-100';

                    items.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'group flex items-center gap-3 p-2.5 hover:bg-slate-50 transition-colors duration-150';
                        
                        li.innerHTML = `
                            <a href="${item.url}" class="flex-1 min-w-0 flex items-center gap-3 text-decoration-none">
                                <!-- Icon -->
                                <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md border border-slate-200 bg-white text-slate-400 shadow-sm group-hover:border-brand-red/30 group-hover:text-brand-red transition-colors">
                                    <i class="fa-solid ${getIconForCalc(item.name)} text-xs" aria-hidden="true"></i>
                                </div>
                                
                                <!-- Text -->
                                <div class="flex-1 min-w-0">
                                    <h3 class="text-xs font-bold text-slate-700 truncate group-hover:text-brand-red transition-colors">${item.name}</h3>
                                    <p class="text-[10px] text-slate-500 truncate">${item.category || 'Tool'}</p>
                                </div>
                            </a>

                            <!-- Delete Action -->
                            <button class="flex h-7 w-7 shrink-0 items-center justify-center rounded bg-slate-100 text-slate-400 hover:bg-red-50 hover:text-red-500 transition-all" data-delete-wishlist data-url="${item.url}" title="Remove from Wishlist" aria-label="Remove ${item.name} from Wishlist">
                                <i class="fa-solid fa-trash-can text-[10px]" aria-hidden="true"></i>
                            </button>
                        `;
                        ul.appendChild(li);
                    });
                    wishlistContainer.appendChild(ul);
                }
            }

            // --- 2. Load History ---
            function loadHistory() {
                let history = [];
                try {
                    history = JSON.parse(localStorage.getItem('dailyCalcHistory')) || [];
                } catch (e) {
                    console.error("Error reading history", e);
                }
                
                historyContainer.innerHTML = ''; 
                if (historyCountBadge) historyCountBadge.textContent = history.length;

                if (history.length === 0) {
                    historyEmptyState.classList.remove('hidden');
                    historyContainer.classList.add('hidden');
                    if (clearHistoryButton) clearHistoryButton.classList.add('hidden');
                } else {
                    historyEmptyState.classList.add('hidden');
                    historyContainer.classList.remove('hidden');
                    if (clearHistoryButton) clearHistoryButton.classList.remove('hidden');

                    const ul = document.createElement('ul');
                    ul.className = 'divide-y divide-slate-100'; 

                    history.forEach(item => {
                        const li = document.createElement('li');
                        li.className = 'group hover:bg-slate-50 transition-colors duration-150';
                        
                        li.innerHTML = `
                            <a href="${item.url || '#'}" class="flex items-center gap-3 p-2.5 text-decoration-none block">
                                <!-- Icon -->
                                <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md border border-slate-200 bg-white text-slate-400 shadow-sm group-hover:border-brand-red/30 group-hover:text-brand-red transition-colors">
                                    <i class="fa-solid ${getIconForCalc(item.calculator)} text-xs" aria-hidden="true"></i>
                                </div>
                                
                                <!-- Middle -->
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-baseline justify-between mb-0.5">
                                        <span class="text-xs font-bold text-slate-700 truncate pr-2 group-hover:text-brand-red transition-colors">${item.calculator}</span>
                                        <span class="text-[9px] text-slate-400 shrink-0">${timeAgo(item.timestamp)}</span>
                                    </div>
                                    <div class="flex items-center gap-2">
                                        <p class="text-[10px] text-slate-500 truncate flex-1" title="${item.inputs}">${item.inputs}</p>
                                    </div>
                                </div>

                                <!-- Right: Result Badge -->
                                <div class="ml-1 shrink-0">
                                    <span class="inline-block max-w-[80px] sm:max-w-[120px] truncate rounded bg-green-50 px-2 py-1 text-[10px] font-bold text-green-700 border border-green-100 text-center">
                                        ${item.result}
                                    </span>
                                </div>
                            </a>
                        `;
                        ul.appendChild(li);
                    });
                    historyContainer.appendChild(ul);
                }
            }

            // --- 3. Load Presets ---
            function loadPresets() {
                let presets = {};
                try {
                    presets = JSON.parse(localStorage.getItem('dailyCalcPresets')) || {};
                } catch (e) {
                    console.error("Error reading presets", e);
                }

                const calculatorNames = Object.keys(presets);
                let totalPresets = 0;
                calculatorNames.forEach(name => totalPresets += presets[name].length);
                
                presetsContainer.innerHTML = '';
                if (presetsCountBadge) presetsCountBadge.textContent = totalPresets;

                if (totalPresets === 0) {
                    presetsEmptyState.classList.remove('hidden');
                    presetsContainer.classList.add('hidden');
                    if (clearPresetsButton) clearPresetsButton.classList.add('hidden');
                } else {
                    presetsEmptyState.classList.add('hidden');
                    presetsContainer.classList.remove('hidden');
                    if (clearPresetsButton) clearPresetsButton.classList.remove('hidden');

                    const ul = document.createElement('ul');
                    ul.className = 'divide-y divide-slate-100';

                    calculatorNames.forEach(calcName => {
                        const calcPresets = presets[calcName];
                        
                        calcPresets.forEach(preset => {
                            const li = document.createElement('li');
                            li.className = 'group flex items-center gap-3 p-2.5 hover:bg-slate-50 transition-colors duration-150 relative';
                            
                            li.innerHTML = `
                                <!-- Icon -->
                                <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-md border border-slate-200 bg-white text-slate-400 shadow-sm">
                                    <i class="fa-solid fa-star text-xs text-yellow-400" aria-hidden="true"></i>
                                </div>

                                <!-- Text Content -->
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2">
                                        <h3 class="text-xs font-bold text-slate-700 truncate">${preset.name}</h3>
                                        <span class="hidden sm:inline text-[9px] text-slate-300">•</span>
                                        <span class="hidden sm:inline text-[9px] text-slate-400 truncate">${calcName}</span>
                                    </div>
                                    <p class="text-[10px] text-slate-500 truncate mt-0.5" title="${preset.inputs}">${preset.inputs}</p>
                                </div>

                                <!-- Actions -->
                                <div class="flex items-center gap-1.5 pl-2">
                                    <a href="${preset.url}" class="flex h-7 w-7 items-center justify-center rounded bg-blue-50 text-blue-600 hover:bg-blue-100 hover:shadow-sm transition-all" title="Load Preset" aria-label="Load Preset ${preset.name}">
                                        <i class="fa-solid fa-arrow-up-right-from-square text-[10px]" aria-hidden="true"></i>
                                    </a>
                                    <button class="flex h-7 w-7 items-center justify-center rounded bg-red-50 text-red-600 hover:bg-red-100 hover:shadow-sm transition-all" data-delete-preset data-calc="${calcName}" data-name="${preset.name}" title="Delete Preset" aria-label="Delete Preset ${preset.name}">
                                        <i class="fa-solid fa-trash-can text-[10px]" aria-hidden="true"></i>
                                    </button>
                                </div>
                            `;
                            ul.appendChild(li);
                        });
                    });
                    presetsContainer.appendChild(ul);
                }
            }

            // --- Event Listeners ---

            // Clear History
            if (clearHistoryButton) {
                clearHistoryButton.addEventListener('click', () => {
                    if (confirm("Are you sure you want to clear your entire calculation history?")) {
                        localStorage.removeItem('dailyCalcHistory');
                        loadHistory();
                    }
                });
            }

            // Clear Presets
            if (clearPresetsButton) {
                clearPresetsButton.addEventListener('click', () => {
                    if (confirm("Are you sure you want to delete ALL saved presets?")) {
                        localStorage.removeItem('dailyCalcPresets');
                        loadPresets();
                    }
                });
            }

            // Delete Individual Preset
            presetsContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-delete-preset]');
                if (btn) {
                    const calc = btn.dataset.calc;
                    const name = btn.dataset.name;
                    if (confirm(`Delete preset "${name}"?`)) {
                        const allPresets = JSON.parse(localStorage.getItem('dailyCalcPresets')) || {};
                        if (allPresets[calc]) {
                            allPresets[calc] = allPresets[calc].filter(p => p.name !== name);
                            if (allPresets[calc].length === 0) delete allPresets[calc];
                            localStorage.setItem('dailyCalcPresets', JSON.stringify(allPresets));
                            loadPresets();
                        }
                    }
                }
            });

            // Delete Individual Wishlist Item
            wishlistContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-delete-wishlist]');
                if (btn) {
                    const url = btn.dataset.url;
                    // Use Global Manager if available, else manual delete
                    if (window.WishlistManager) {
                        window.WishlistManager.remove(url);
                    } else {
                        // Fallback
                        let items = JSON.parse(localStorage.getItem('dailyCalcWishlist')) || [];
                        items = items.filter(i => i.url !== url);
                        localStorage.setItem('dailyCalcWishlist', JSON.stringify(items));
                    }
                    loadWishlist();
                    // Dispatch event to update header/mobile counts if they exist
                    window.dispatchEvent(new Event('wishlistUpdated'));
                }
            });

            // --- Initial Load ---
            loadWishlist();
            loadHistory();
            loadPresets();

            // Listen for cross-tab updates or header updates
            window.addEventListener('wishlistUpdated', loadWishlist);
        });
    </script>
</body>
</html>
